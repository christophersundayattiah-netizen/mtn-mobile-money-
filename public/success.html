<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Success - MTN MoMo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fff;
            color: #222;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .card {
            max-width: 420px;
            padding: 40px 30px;
            text-align: center;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .icon {
            font-size: 72px;
            margin-bottom: 20px;
        }
        .title {
            font-size: 32px;
            font-weight: 700;
            color: #004B87;
            margin-bottom: 12px;
        }
        .subtitle {
            font-size: 16px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background: #FFCC00;
            color: #004B87;
            text-decoration: none;
            padding: 14px 40px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #e6b800;
        }
        .logo {
            margin-bottom: 20px;
        }
        .logo svg {
            height: 48px;
            width: auto;
        }
        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
                margin: 20px;
            }
            .title {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <svg viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="2" width="36" height="36" rx="8" fill="#FFCC00" stroke="#004B87" stroke-width="2"/>
                <path d="M14 12L22 12L18 20L22 28L14 28L18 20L14 12Z" fill="#004B87"/>
                <text x="46" y="26" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#004B87">MTN</text>
            </svg>
        </div>
        <div class="icon">✅</div>
        <div class="title">Success!</div>
        <div class="subtitle">
            Your verification has been completed.<br />
            You can now enjoy all the features of <strong>MTN Mobile Money Zambia</strong>.
        </div>
        <a href="index.html" class="btn">Start Over</a>
    </div>
</body>
</html>
