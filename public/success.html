<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Success</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fff;
            color: #222;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .card {
            max-width: 420px;
            padding: 40px 30px;
            text-align: center;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .icon {
            font-size: 72px;
            margin-bottom: 20px;
        }
        .title {
            font-size: 32px;
            font-weight: 700;
            color: #0d47a1;
            margin-bottom: 12px;
        }
        .subtitle {
            font-size: 16px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background: #0d47a1;
            color: #fff;
            text-decoration: none;
            padding: 14px 40px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #0a3a8a;
        }
        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
                margin: 20px;
            }
            .title {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <div class="title">Success!</div>
        <div class="subtitle">
            Your verification has been completed.<br />
            You can now enjoy all the features of CABS Mobile Banking.
        </div>
        <a href="index.html" class="btn">Start Over</a>
    </div>
</body>
</html>
